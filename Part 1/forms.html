<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="icon" href="favicon.png">
</head>
<body>

    <header style="
        background-color: aquamarine;
        border-width: 5px;
        border-style: solid;
        border-color: blueviolet;
    ">

        <h1>Welcome to TunaTime!</h1>
        <br>

        <p>Your favorite social reef online!</p>
        <br>

        <a href="test.html">Test</a>
        <a href="table.html">Table</a>
        <a href="thing.html">Thing</a>
        <a href="two.html">Two</a>

        <hr>
        <br>

    </header>

    <main>

        <form action="index.php" method="post">

            <label for="username">Username:</label>
            <input
                type="text"
                name="username"
                id="username"
                required>
            <br>

            <label for="password">Password:</label>
            <input
                type="password"
                name="password"
                id="password"
                minlength="10"
                required>
            <br>

            <label for="email">E-mail:</label>
            <input
                type="email"
                name="email"
                id="email"
                placeholder="soft.dev@gmail.com"
                required>
            <br>

            <label for="tel">Phone number:</label>
            <input
                type="tel"
                name="tel"
                id="tel"
                placeholder="01-23-45-67-89"
                pattern="[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}"
                required>
            <br>

            <label
                style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;"
                for="date">
                Date of birth:
            </label>

            <input
                type="date"
                name="date"
                id="date"
                required>
            <br>

            <label for="number">How many friends do you have?:</label>

            <input
                type="number"
                name="number"
                id="number"
                min="-256"
                max="256"
                required>
            <br>

            <label
                for="desc"
                style="display: block;">
                Describe yourself!:
            </label>

            <textarea
                name="desc"
                id="desc"
                rows="5"
                cols="78"
                placeholder="I'm such a cool fish and I swim faster&#10;than a swordfish bro Swordfish"
                required></textarea>

            <br><br>

            <label>What type of fish are you?</label>
            <br>

            <input
                type="radio"
                name="fish"
                id="fish"
                value="Fish"
                required>
            <label for="fish">Fish</label>
            <br>

            <input
                type="radio"
                name="fish"
                id="poisson"
                value="Poisson">
            <label for="poisson">Poisson</label>
            <br>

            <input
                type="radio"
                name="fish"
                id="pez"
                value="Pez">
            <label for="pez">Pez</label>
            <br><br>

            <label for="gender">Choose your gender:</label>

            <select
                name="gender"
                id="gender"
                required>

                <option value="" selected disabled>
                    -- Select one --
                </option>

                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Fishè">Fishè</option>
                <option value="NVIDIA GeForce RTX 5090 Laptop GPU, 24GB GDDR7">
                    NVIDIA GeForce RTX 5090 Laptop GPU, 24GB GDDR7
                </option>
                <option value="3.6kg chassis">
                    3.6kg chassis
                </option>

            </select>

            <br><br>

            <input type="submit" value="Create Account">
            <input type="reset" value="Reset">

        </form>

    </main>

    <footer>

    </footer>

</body>
</html>
