<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account creation</title>
</head>
<body>
    <head>
 <h1>Account creation</h1> <br>
 <h3>Please enter your information.</h3>
 <hr>
    </head>
    <main>
 <form>

         <label for="username">Enter your username:</label>
         <input type="" id="username" name="username" required> <br>


         <label for="password">Enter your password:</label>
         <input type="password" id="password" name="password required"> <br>


         <label for="email">Enter your E-mail address:</label>
         <input type="email" id="email" name="email"> <br>


         <label for="date">Enter your birthdate</label>
         <input type="date" id="date" name="date" required> <br>


         <label for="file">Send your Identification Papers:</label>
         <input type="file" id="file" name="file"> <br>


         <label for="chender">Enter your chender:</label>

         <select name="chender" id="chender" name="chender">

            <option value="Cheddar">Cheddar</option>
            <option value="Gorgonzola">Gorgonzola</option>
            <option value="Emmental">Emmental</option>
            <option value="Gouda">Gouda</option>
            <option value="Other">Other</option>

         </select> <br>

         <label for="title">Idk anymore:</label>

         <label for="Yes">Yes:</label>
         <input type="radio" name="title"> <br>


         <label for="Okay">Okay:</label>
         <input type="radio" name="title"> <br>


         <label for="No">No:</label>
         <input type="radio" name="title"> <br>


         <label for="What">What:</label>
         <input type="radio" name="title"> <br>
         
         <label for="desc">Describe yourself:</label>
         <textarea name="desc" id="desc" 
         placeholder="I'm a good cheese wheel and I'm
         quite aged and fruity" required rows="5" cols="30"></textarea> <br>

         <label for="number">How many friends do you have?</label>
         <input type="number" id="number" name="number" 
         min="-256" max="256" style="background-color: blue;" required>
 <br>
         <label for="checkbox">I agree to the <a href="pol.html">
            Terms of Service
         </a> of CheeseStrings</label>
         <input type="checkbox" id="checkbox" name="checkbox" required> <br>

         <input type="submit" value="Create Account" style="background-color: green;">
         <input type="reset" style="background-color: red;">
            
            </form>

    </main>
    <footer>

    </footer>
</body>
</html>
